# Local development overrides - this file is used automatically by docker compose
# when running locally. Do NOT commit secrets here.
version: '3.8'

services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/src:/app/src   # live-reload source during dev
      - ebay_data:/app/data
    environment:
      - NODE_ENV=development

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3001
